spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: ${APP_NAME}
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: quantity-service
              uri: lb://quantity-measurement-service
              predicates:
                - Path=/quantity/**
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/auth/**

server:
  port: ${PORT}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG
