<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantity Measurement App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Quantity Measurement App</h1>

        <div class="form-section">
            <h2>Enter Quantities</h2>

            <div class="input-group">
                <label>Value 1</label>
                <input type="number" id="value1" placeholder="Enter value">
                <select id="unit1">
                    <option value="FEET">Feet</option>
                    <option value="INCHES">Inches</option>
                    <option value="YARDS">Yards</option>
                    <option value="CENTIMETERS">Centimeters</option>
                    <option value="KILOGRAM">Kilogram</option>
                    <option value="GRAM">Gram</option>
                    <option value="POUND">Pound</option>
                    <option value="LITRE">Litre</option>
                    <option value="MILLILITRE">Millilitre</option>
                    <option value="GALLON">Gallon</option>
                </select>
            </div>

            <div class="input-group">
                <label>Value 2</label>
                <input type="number" id="value2" placeholder="Enter value">
                <select id="unit2">
                    <option value="FEET">Feet</option>
                    <option value="INCHES">Inches</option>
                    <option value="YARDS">Yards</option>
                    <option value="CENTIMETERS">Centimeters</option>
                    <option value="KILOGRAM">Kilogram</option>
                    <option value="GRAM">Gram</option>
                    <option value="POUND">Pound</option>
                    <option value="LITRE">Litre</option>
                    <option value="MILLILITRE">Millilitre</option>
                    <option value="GALLON">Gallon</option>
                </select>
            </div>

            <div class="button-group">
                <button onclick="calculate('add')">Add</button>
                <button onclick="calculate('compare')">Compare</button>
                <button onclick="calculate('subtract')">Subtract</button>
                <button onclick="calculate('divide')">Divide</button>
            </div>
        </div>

        <div class="result-section">
            <h2>Result</h2>
            <div id="result" class="result-box">Result will appear here</div>
            <div id="error" class="error-box"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
