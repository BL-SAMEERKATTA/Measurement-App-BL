version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: quantitydb
    ports:
      - "3306:3306"

  quantity-app:
    build: .
    container_name: quantity-measurement-app
    ports:
      - "8080:8080"
    environment:
      spring.datasource.url: jdbc:mysql://mysql:3306/quantitydb?createDatabaseIfNotExist=true
      spring.datasource.username: root
      spring.datasource.password: root
    depends_on:
      - mysql
